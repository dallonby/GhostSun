name: Desktop builds

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-builds-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  windows:
    name: Windows x64
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Rust
        shell: pwsh
        run: |
          rustup set profile minimal
          rustup toolchain install stable --target x86_64-pc-windows-msvc
          rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-x64-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Test workspace
        run: cargo test --release --workspace --locked

      - name: Package application
        shell: pwsh
        run: ./scripts/package-windows.ps1 -Destination dist

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: GhostSun-Windows-x64
          path: dist/GhostSun-Windows-x64.zip
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: Apple Silicon
            runner: macos-15
            target: aarch64-apple-darwin
            package: GhostSun-macOS-Apple-Silicon
          - arch: Intel
            runner: macos-15-intel
            target: x86_64-apple-darwin
            package: GhostSun-macOS-Intel
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup set profile minimal
          rustup toolchain install stable --target "${{ matrix.target }}"
          rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Test workspace
        run: cargo test --release --workspace --locked

      - name: Package application
        run: bash scripts/package-macos.sh "${{ matrix.target }}" dist "${{ matrix.package }}"

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: dist/${{ matrix.package }}.zip
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  release:
    name: Publish tagged release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - windows
      - macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packages
        uses: actions/download-artifact@v5
        with:
          pattern: GhostSun-*
          path: dist
          merge-multiple: true

      - name: Create archive checksums
        run: |
          cd dist
          sha256sum ./*.zip > SHA256SUMS.txt

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          files=(dist/*.zip dist/SHA256SUMS.txt)
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${files[@]}" --clobber
          else
            gh release create "$TAG" "${files[@]}" --verify-tag --generate-notes
          fi
